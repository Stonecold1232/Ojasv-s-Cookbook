<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Ojasv's Cookbook — Turn leftover ingredients into delicious recipes with a single click.">
  <title>Ojasv's Cookbook — Recipe Magic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    /* ── Reset & Base ──────────────────────────────────── */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0b0f1a;
      --bg-card: rgba(255, 255, 255, 0.04);
      --bg-card-hover: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.08);
      --text-primary: #f0f2f8;
      --text-secondary: #8b92a8;
      --accent: #6c63ff;
      --accent-glow: rgba(108, 99, 255, 0.35);
      --accent-2: #ff6b9d;
      --accent-gradient: linear-gradient(135deg, #6c63ff 0%, #ff6b9d 50%, #ffa64d 100%);
      --input-bg: rgba(255, 255, 255, 0.06);
      --input-focus: rgba(108, 99, 255, 0.18);
      --radius: 16px;
      --radius-sm: 12px;
      --font: 'Outfit', system-ui, sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ── Animated background blobs ─────────────────────── */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: .35;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 500px;
      height: 500px;
      background: var(--accent);
      top: -120px;
      left: -100px;
      animation: drift 18s ease-in-out infinite alternate;
    }

    body::after {
      width: 420px;
      height: 420px;
      background: var(--accent-2);
      bottom: -80px;
      right: -80px;
      animation: drift 22s ease-in-out infinite alternate-reverse;
    }

    @keyframes drift {
      0% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(60px, 40px) scale(1.15);
      }

      100% {
        transform: translate(-30px, 70px) scale(0.95);
      }
    }

    /* ── Wrapper ───────────────────────────────────────── */
    .app-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      padding: 60px 24px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Heading ───────────────────────────────────────── */
    .logo-group {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo-icon {
      font-size: 56px;
      display: block;
      margin-bottom: 8px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15;
    }

    .tagline {
      margin-top: 8px;
      font-size: 1rem;
      font-weight: 400;
      color: var(--text-secondary);
      letter-spacing: 0.01em;
    }

    /* ── Card ──────────────────────────────────────────── */
    .card {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      transition: background .3s;
    }

    .card:hover {
      background: var(--bg-card-hover);
    }

    /* ── Input Group ───────────────────────────────────── */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 28px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
    }

    .field input {
      width: 100%;
      padding: 14px 18px;
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 400;
      color: var(--text-primary);
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      outline: none;
      transition: border .25s, background .25s, box-shadow .25s;
    }

    .field input::placeholder {
      color: rgba(139, 146, 168, 0.5);
    }

    .field input:focus {
      border-color: var(--accent);
      background: var(--input-focus);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    /* ── Button ────────────────────────────────────────── */
    .btn-cook {
      width: 100%;
      padding: 16px;
      font-family: var(--font);
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #fff;
      background: var(--accent-gradient);
      background-size: 200% 200%;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform .2s, box-shadow .3s;
      animation: shimmer 4s ease-in-out infinite;
    }

    .btn-cook:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px var(--accent-glow);
    }

    .btn-cook:active {
      transform: translateY(0) scale(0.98);
    }

    @keyframes shimmer {

      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    /* sparkle pseudo-element on button */
    .btn-cook::after {
      content: '✦';
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      opacity: .7;
      transition: opacity .2s;
    }

    .btn-cook:hover::after {
      opacity: 1;
    }

    /* ── Result Container ──────────────────────────────── */
    #result-container {
      width: 100%;
      margin-top: 32px;
      min-height: 0;
      transition: min-height .4s ease;
    }

    #result-container:not(:empty) {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 28px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      animation: fadeUp .45s ease-out both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Result inner formatting ───────────────────────── */
    #result-container h2 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 12px;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #result-container h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent-2);
      margin: 18px 0 8px;
    }

    #result-container p,
    #result-container li {
      font-size: 0.92rem;
      line-height: 1.7;
      color: var(--text-secondary);
    }

    #result-container ul,
    #result-container ol {
      padding-left: 20px;
      margin-bottom: 8px;
    }

    #result-container li {
      margin-bottom: 4px;
    }

    #result-container strong {
      color: var(--text-primary);
    }

    /* ── Loading Spinner ───────────────────────────────── */
    .loader-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 32px 0;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loader-wrap span {
      font-size: 0.88rem;
      color: var(--text-secondary);
    }

    /* ── Button disabled state ─────────────────────────── */
    .btn-cook:disabled {
      opacity: .55;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    /* ── Error state ───────────────────────────────────── */
    .error-msg {
      color: #ff6b6b;
      font-size: 0.9rem;
      text-align: center;
      line-height: 1.6;
    }

    /* ── Footer ────────────────────────────────────────── */
    .footer {
      margin-top: 56px;
      font-size: 0.78rem;
      color: var(--text-secondary);
      opacity: .5;
      text-align: center;
    }

    /* ── Responsive ────────────────────────────────────── */
    @media (max-width: 480px) {
      .app-wrapper {
        padding: 40px 16px 60px;
      }

      h1 {
        font-size: 2rem;
      }

      .card {
        padding: 28px 20px;
      }
    }
  </style>
</head>

<body>

  <div class="app-wrapper">

    <!-- ── Heading ────────────────────────────────────── -->
    <header class="logo-group">
      <span class="logo-icon" aria-hidden="true">🍳</span>
      <h1>Ojasv's Cookbook</h1>
      <p class="tagline">Turn leftovers into culinary magic</p>
    </header>

    <!-- ── Input Card ────────────────────────────────── -->
    <main class="card" id="input-card">
      <form id="ingredient-form" class="input-group" autocomplete="off">

        <div class="field">
          <label for="ingredient-1">Ingredient 1</label>
          <input type="text" id="ingredient-1" name="ingredient1" placeholder="e.g. Chicken" required>
        </div>

        <div class="field">
          <label for="ingredient-2">Ingredient 2</label>
          <input type="text" id="ingredient-2" name="ingredient2" placeholder="e.g. Garlic" required>
        </div>

        <div class="field">
          <label for="ingredient-3">Ingredient 3</label>
          <input type="text" id="ingredient-3" name="ingredient3" placeholder="e.g. Pasta" required>
        </div>

        <button type="submit" class="btn-cook" id="cook-button">Cook Magic</button>
      </form>
    </main>

    <!-- ── Result Container (empty, filled by JS) ──── -->
    <div id="result-container"></div>

    <footer class="footer">Ojasv's Cookbook &copy; 2026</footer>
  </div>

  <script>
    /* ═══════════════════════════════════════════════════
       Ojasv's Cookbook — Frontend
       Calls /api/recipe on the backend proxy.
       The API key is NEVER exposed to the browser.
       ═══════════════════════════════════════════════════ */

    // DOM refs
    const form = document.getElementById('ingredient-form');
    const btn = document.getElementById('cook-button');
    const resultBox = document.getElementById('result-container');
    const inputs = [
      document.getElementById('ingredient-1'),
      document.getElementById('ingredient-2'),
      document.getElementById('ingredient-3'),
    ];

    /* ── Convert basic Markdown to HTML ─────────────── */
    function mdToHtml(md) {
      // Tag list items with their type so we can wrap correctly later
      let html = md
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/^[\-\*] (.+)$/gm, '<li data-type="ul">$1</li>')
        .replace(/^\d+\.\s(.+)$/gm, '<li data-type="ol">$1</li>')
        .replace(/\n{2,}/g, '</p><p>')
        .replace(/(?<!<\/li>)\n(?!<)/g, '<br>');

      // Wrap consecutive <li> groups in the correct list tag
      html = html.replace(/(<li data-type="(ul|ol)">.*?<\/li>(?:<br>)?)+/gs, (match) => {
        const type = match.includes('data-type="ol"') ? 'ol' : 'ul';
        const clean = match.replace(/<br>/g, '').replace(/ data-type="(ul|ol)"/g, '');
        return `<${type}>${clean}</${type}>`;
      });

      return '<p>' + html + '</p>';
    }

    /* ── Show loading state ─────────────────────────── */
    function showLoading() {
      resultBox.innerHTML =
        `<div class="loader-wrap">
           <div class="spinner"></div>
           <span>Cooking up something amazing…</span>
         </div>`;
    }

    /* ── Show error ─────────────────────────────────── */
    function showError(message) {
      resultBox.innerHTML =
        `<p class="error-msg">⚠️ ${message}</p>`;
    }

    /* ── Main handler ──────────────────────────────── */
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // 1. Read ingredient values
      const ingredients = inputs.map(i => i.value.trim());
      if (ingredients.some(v => v === '')) return;

      // Lock UI
      btn.disabled = true;
      btn.textContent = 'Cooking…';
      showLoading();

      try {
        // 2. Send ingredients to backend proxy (no API key in browser!)
        const response = await fetch('/api/recipe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ingredients })
        });

        if (!response.ok) {
          const err = await response.json().catch(() => null);
          throw new Error(err?.error || `Request failed (${response.status})`);
        }

        const data = await response.json();

        // 3. Display recipe in result container
        resultBox.innerHTML = mdToHtml(data.text || 'No recipe returned — try different ingredients!');

      } catch (err) {
        console.error('Error:', err);
        showError(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Cook Magic';
      }
    });
  </script>

</body>

</html>
